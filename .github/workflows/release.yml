name: Release

# Path-triggered: bump a package's `version` in package.json on `main` and this
# workflow builds, publishes, and tags each package whose version is ahead of
# its `<name>@<version>` git tag.
#
# Auth: OIDC trusted publishing — no NPM_TOKEN secret required.
# Configure the trusted publisher on each npm package page:
#   Settings → Trusted Publishers → Add → GitHub Actions
#     Repository owner:  Digital-Udvikling
#     Repository:        admin-design-system
#     Workflow filename: release.yml
#     Environment:       (leave empty)
# Must be done once per package (@aortl/admin-css, @aortl/admin-react).

on:
  push:
    branches: [main]
    paths:
      - "packages/*/package.json"
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # for git push tag
      id-token: write # OIDC handshake with npm
      attestations: write # build provenance attestations
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Determine packages to release
        id: plan
        run: |
          set -euo pipefail
          PKGS=""
          for f in packages/*/package.json; do
            [ "$(jq -r '.private // false' "$f")" = "true" ] && continue
            NAME="$(jq -r .name "$f")"
            VERSION="$(jq -r .version "$f")"
            TAG="$NAME@$VERSION"
            if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
              echo "✓ $TAG already tagged, skipping"
            else
              echo "→ Will release $TAG"
              PKGS="$PKGS $NAME"
            fi
          done
          echo "packages=${PKGS# }" >> "$GITHUB_OUTPUT"

      - uses: pnpm/action-setup@v4
        if: steps.plan.outputs.packages != ''

      # Node 24 ships npm 11.x; OIDC trusted publishing needs npm >= 11.5.
      - uses: actions/setup-node@v5
        if: steps.plan.outputs.packages != ''
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install
        if: steps.plan.outputs.packages != ''
        run: pnpm install --frozen-lockfile

      # Gate the irreversible publish + tag on the same checks CI runs. The
      # release workflow fires on the version-bump push in parallel with ci.yml
      # and has no dependency on it, so without this a commit that bumps a
      # version while tests/lint/types are red would publish (with a provenance
      # attestation) and tag a broken release — permanently, since the tag then
      # makes the plan step skip re-publishing it. `build` runs first because
      # the docs type-check (astro check) needs the built workspace types.
      - name: Validate before publishing
        if: steps.plan.outputs.packages != ''
        run: |
          pnpm lint
          pnpm format:check
          pnpm build
          pnpm check-types
          pnpm test

      # Publish via `pnpm pack` + `npm publish <tarball>` rather than
      # `pnpm publish`: pnpm pack rewrites `workspace:*` deps to real
      # versions in the tarball, and npm CLI 11.5+ has first-class support
      # for OIDC trusted publishing and provenance — pnpm publish does not.
      - name: Build, publish, and tag each package
        if: steps.plan.outputs.packages != ''
        run: |
          set -euo pipefail
          for NAME in ${{ steps.plan.outputs.packages }}; do
            DIR=""
            for f in packages/*/package.json; do
              if [ "$(jq -r .name "$f")" = "$NAME" ]; then
                DIR="$(dirname "$f")"
                break
              fi
            done
            VERSION="$(jq -r .version "$DIR/package.json")"
            TAG="$NAME@$VERSION"
            echo "::group::Release $TAG"
            pnpm -r --filter "$NAME..." build
            (
              cd "$DIR"
              pnpm pack
              npm publish ./*.tgz --access public --provenance
              rm -f ./*.tgz
            )
            git tag "$TAG"
            git push origin "$TAG"
            echo "::endgroup::"
          done
