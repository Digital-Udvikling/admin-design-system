name: Preview release

# Per-commit prereleases via pkg.pr.new. Requires the pkg.pr.new GitHub App
# (https://github.com/apps/pkg-pr-new) installed with access to this repo; the bot
# then comments install URLs (pnpm add https://pkg.pr.new/@aortl/admin-react@<sha>)
# on each PR. Main pushes also publish under the commit SHA.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpx pkg-pr-new publish --pnpm './packages/admin-css' './packages/admin-react'
