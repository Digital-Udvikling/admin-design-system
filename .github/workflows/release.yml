name: Release

# Bump a package version on `main`; each package whose version isn't yet on npm
# is built and published. A shared `v<version>` umbrella tag + GitHub Release are
# cut once per release (the target of the changelog compare links).
#
# Auth: OIDC trusted publishing (no NPM_TOKEN). Configure once per package on its
# npm page: Settings → Trusted Publishers → Add → GitHub Actions, with owner
# Digital-Udvikling, repo admin-design-system, workflow release.yml, no environment.

on:
  push:
    branches: [main]
    paths:
      - "packages/*/package.json"
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # for git push tag
      id-token: write # OIDC handshake with npm
      attestations: write # build provenance attestations
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Determine packages to release
        id: plan
        run: |
          set -euo pipefail
          PKGS=""
          for f in packages/*/package.json; do
            [ "$(jq -r '.private // false' "$f")" = "true" ] && continue
            NAME="$(jq -r .name "$f")"
            VERSION="$(jq -r .version "$f")"
            if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
              echo "✓ $NAME@$VERSION already published, skipping"
            else
              echo "→ Will release $NAME@$VERSION"
              PKGS="$PKGS $NAME"
            fi
          done
          echo "packages=${PKGS# }" >> "$GITHUB_OUTPUT"

      - uses: pnpm/action-setup@v4
        if: steps.plan.outputs.packages != ''

      # Node 24 ships npm 11.x; OIDC trusted publishing needs npm >= 11.5.
      - uses: actions/setup-node@v5
        if: steps.plan.outputs.packages != ''
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install
        if: steps.plan.outputs.packages != ''
        run: pnpm install --frozen-lockfile

      # This runs in parallel with ci.yml (no dependency on it), so gate the
      # irreversible publish here — a red version-bump commit would otherwise publish
      # a broken release permanently, since the published version makes the plan step
      # skip re-publishing. `build` first: the docs type-check needs built workspace types.
      - name: Validate before publishing
        if: steps.plan.outputs.packages != ''
        run: |
          set -euo pipefail
          for NAME in ${{ steps.plan.outputs.packages }}; do
            for f in packages/*/package.json; do
              [ "$(jq -r .name "$f")" = "$NAME" ] || continue
              VER="$(jq -r .version "$f")"
              grep -q "^## \[$VER\]" CHANGELOG.md \
                || { echo "CHANGELOG.md has no \"## [$VER]\" section"; exit 1; }
            done
          done
          pnpm lint
          pnpm format:check
          pnpm build
          pnpm check-types
          pnpm test

      # `pnpm pack` rewrites `workspace:*` deps to real versions, and npm 11.5+
      # supports OIDC trusted publishing + provenance — `pnpm publish` does neither.
      - name: Build and publish each package
        if: steps.plan.outputs.packages != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          for NAME in ${{ steps.plan.outputs.packages }}; do
            DIR=""
            for f in packages/*/package.json; do
              if [ "$(jq -r .name "$f")" = "$NAME" ]; then
                DIR="$(dirname "$f")"
                break
              fi
            done
            VERSION="$(jq -r .version "$DIR/package.json")"
            echo "::group::Release $NAME@$VERSION"
            pnpm -r --filter "$NAME..." build
            (
              cd "$DIR"
              pnpm pack
              npm publish ./*.tgz --access public --provenance
              rm -f ./*.tgz
            )

            # Umbrella tag + GitHub Release, keyed off the shared version. The
            # changelog compare links point at v<version>; both packages bump in
            # lockstep, so the second package this run finds it already pushed.
            UTAG="v$VERSION"
            if ! git rev-parse -q --verify "refs/tags/$UTAG" >/dev/null \
               && ! git ls-remote --exit-code --tags origin "$UTAG" >/dev/null 2>&1; then
              git tag "$UTAG"
              git push origin "$UTAG"
              NOTES="$(awk "/^## \[$VERSION\]/{f=1;next} /^## \[/{f=0} f" CHANGELOG.md)"
              gh release create "$UTAG" --title "$UTAG" --notes "${NOTES:-No changelog entry.}"
            fi
            echo "::endgroup::"
          done
